<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>组会 Duty 报告看板</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --primary: #2563eb;
            --accent: #ef4444;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1);
            width: 450px;
            text-align: center;
            position: relative;
        }

        /* 顶部日期信息 */
        .next-meeting-info { margin-bottom: 30px; }
        .next-meeting-info .date-label {
            font-size: 14px; color: #64748b; text-transform: uppercase; letter-spacing: 1px;
        }
        .next-meeting-info .date-value {
            font-size: 28px; font-weight: 800; color: var(--primary); margin-top: 5px;
        }

        /* 轮盘容器 */
        .wheel-area {
            position: relative; width: 320px; height: 320px; margin: 0 auto 30px;
        }

        .outer-ring {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            border: 2px dashed #e2e8f0; box-sizing: border-box;
        }

        .name-label {
            position: absolute; left: 50%; top: 50%; width: 140px; text-align: center;
            font-size: 16px; font-weight: 500; color: #94a3b8; transition: all 0.3s;
        }
        .name-label.active {
            color: #1e293b; font-weight: 800; font-size: 20px; transform: scale(1.1);
        }

        /* 指针光束 */
        .light-beam {
            position: absolute; top: 50%; left: 50%; width: 4px; height: 100px;
            background: linear-gradient(to top, var(--primary), transparent);
            transform-origin: bottom center; margin-top: -100px; margin-left: -2px;
            z-index: 5; transition: transform 1s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .light-beam::after {
            content: ''; position: absolute; top: -10px; left: -3px; width: 10px; height: 10px;
            background: var(--primary); border-radius: 50%; box-shadow: 0 0 15px var(--primary);
        }

        /* 中央显示区 */
        .center-display {
            position: absolute; top: 50%; left: 50%; width: 110px; height: 110px;
            background: white; border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
        }
        .center-display .title { font-size: 12px; color: #94a3b8; }
        .center-display .speaker { font-size: 18px; font-weight: 800; color: #1e293b; margin-top: 4px; }

        .footer { border-top: 1px solid #f1f5f9; padding-top: 20px; color: #64748b; font-size: 14px; }
        .highlight-text { color: var(--accent); font-weight: 600; }

        /* 邮件提醒按钮���式 */
        .btn-notify {
            display: inline-block; margin-top: 15px; padding: 10px 24px;
            background-color: var(--primary); color: white; text-decoration: none;
            border-radius: 8px; font-weight: 600; font-size: 14px;
            transition: background 0.3s; cursor: pointer; border: none;
        }
        .btn-notify:hover { background-color: #1d4ed8; }
    </style>
</head>
<body>

<div class="card">
    <div class="next-meeting-info">
        <div class="date-label">下次组会 (Next Meeting)</div>
        <div class="date-value" id="meetingDate">2026-04-09</div>
    </div>

    <div class="wheel-area">
        <div class="outer-ring"></div>
        <div id="labels-container"></div>
        <div class="light-beam" id="beam"></div>
        
        <div class="center-display">
            <span class="title">本周报告人</span>
            <span class="speaker" id="currentSpeaker">-</span>
        </div>
    </div>

    <div class="footer">
        下周预告：<span id="nextSpeaker" class="highlight-text">-</span><br>
        <a id="notifyBtn" class="btn-notify" href="#">✉️ 邮件提醒本周报告人</a>
    </div>
</div>

<script>
    const members = [ "Yujie Cao", "Xiyuan Li", "Danny", "Jialin Sun", "Weitao Lyu"];
    // 请在这里填入对应的邮箱地址（顺序必须与上方人员名字对应！）
    const emails = [ 
        "yujie.cao@example.com", 
        "xiyuan.li@example.com", 
        "danny@example.com", 
        "jialin.sun@example.com", 
        "weitao.lyu@example.com"
    ];
    const holidays = ["2026-01-01", "2026-02-19", "2026-10-01", "2026-10-08"];
    const offset = 1; // 用于校准错位的进度，1代表往后推一人
    
    function getLocalDateString(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    function updateDashboard() {
        const now = new Date();
        const day = now.getDay(); // 0:周日, 1:周一 ... 4:周四, 5:周五, 6:周六
        const hour = now.getHours();

        // 1. 核心逻辑：定义"轮换周期"。我们让一周的展示周期从 "周五17:00" 开始，到下周五 "16:59" 结束。
        let diffToThursday = 0;
        if (day === 5 && hour >= 17) {
            diffToThursday = 6; // 如果是周五且过了 17:00，指向下周四
        } else if (day === 6) {
            diffToThursday = 5; // 如果是周六，指向下周四
        } else if (day === 5 && hour < 17) {
            diffToThursday = -1; // 如果是周五但还没到 17:00，依然显示昨天的周四
        } else {
            diffToThursday = 4 - day; // 如果是周日到周四，指向本周四
        }

        let targetThursday = new Date(now);
        targetThursday.setDate(targetThursday.getDate() + diffToThursday);
        targetThursday.setHours(0, 0, 0, 0);

        // 处理节假日跳过逻辑：如果目标周四正好是节假日，顺延到下周
        let actualMeetingDate = new Date(targetThursday);
        while (holidays.includes(getLocalDateString(actualMeetingDate))) {
            actualMeetingDate.setDate(actualMeetingDate.getDate() + 7);
        }

        document.getElementById('meetingDate').innerText = getLocalDateString(actualMeetingDate);

        // 2. 计算从年初到这个 targetThursday 一共有多少个有效的组会日
        let start = new Date(2026, 0, 1);
        start.setHours(0, 0, 0, 0);
        let validCount = 0;
        let temp = new Date(start);
        
        while (temp <= actualMeetingDate) {
            if (temp.getDay() === 4) {
                let ds = getLocalDateString(temp);
                if (!holidays.includes(ds)) validCount++;
            }
            temp.setDate(temp.getDate() + 1);
        }

        // 3. 计算本周索引
        const thisIdx = (validCount - 1 + offset) % members.length;
        const nextIdx = (thisIdx + 1) % members.length;

        // 4. 渲染名字
        const container = document.getElementById('labels-container');
        container.innerHTML = ''; 
        const step = 360 / members.length;
        
        members.forEach((name, i) => {
            const label = document.createElement('div');
            label.className = 'name-label' + (i === thisIdx ? ' active' : '');
            const angle = i * step;
            const radian = ((angle - 90) * Math.PI) / 180;
            const x = Math.cos(radian) * 125;
            const y = Math.sin(radian) * 125;
            
            label.style.transform = `translate(${x}px, ${y}px) translate(-50%, -50%)`;
            label.innerText = name;
            container.appendChild(label);
        });

        // 5. 更新指针与文本
        document.getElementById('beam').style.transform = `rotate(${thisIdx * step}deg)`;
        document.getElementById('currentSpeaker').innerText = members[thisIdx];
        document.getElementById('nextSpeaker').innerText = members[nextIdx];

        // 6. 配置微信群复制文案按钮
        const notifyBtn = document.getElementById('notifyBtn');
        const meetingDateStr = getLocalDateString(actualMeetingDate);
        const speakerName = members[thisIdx];
        
        // 修改按钮文字
        notifyBtn.innerText = '📋 一键复制微信群提醒文案';
        notifyBtn.href = '#';
        
        // 绑定点击复制事件
        notifyBtn.onclick = function(e) {
            e.preventDefault(); // 阻止默认跳转
            
            // 组装要在微信群里发的文案
            const text = `【组会报告提醒】🔔\n下一次组会 (${meetingDateStr}) 的报告人是：@${speakerName} \n请提前做好准备哦！`;
            
            // 写入剪贴板
            navigator.clipboard.writeText(text).then(() => {
                alert('✅ 文案已成功复制！\n\n请直接打开微信群，长按或 Ctrl+V 粘贴发送吧~');
            }).catch(err => {
                alert('复制失败，请手动记录。');
            });
        };

    updateDashboard();
</script>

</body>
</html>
